<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --d:#09090b;--d2:#0f0f12;--d3:#16161a;--d4:#23232a;--d5:#32323a;
  --t:#f0ece4;--t2:#d4cfc6;--td:#a8a29e;--g:#c9a96e;--gd:#b8944f;
  --r:16px;--r-sm:10px;
}
body{background:var(--d);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.6}
a{color:var(--g);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.serif{font-family:'Cormorant Garamond',Georgia,serif}

/* Header */
.seo-header{border-bottom:1px solid var(--d4);padding:18px 0}
.seo-header .container{display:flex;align-items:center;justify-content:space-between}
.seo-logo{font-family:'Cormorant Garamond',Georgia,serif;font-size:1.5rem;color:var(--g);text-decoration:none;font-weight:600;letter-spacing:.5px}
.seo-logo:hover{text-decoration:none;opacity:.85}
.seo-nav{display:flex;gap:1.5rem;font-size:.9rem}
.seo-nav a{color:var(--td)}
.seo-nav a:hover{color:var(--t);text-decoration:none}

/* Breadcrumb */
.breadcrumb{padding:1rem 0;font-size:.85rem;color:var(--td)}
.breadcrumb a{color:var(--td)}
.breadcrumb a:hover{color:var(--g)}
.breadcrumb span{margin:0 .5rem;opacity:.5}

/* Footer */
.seo-footer{border-top:1px solid var(--d4);padding:3rem 0;margin-top:4rem;color:var(--td);font-size:.85rem}
.seo-footer .container{display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-between;align-items:center}
.seo-footer-links{display:flex;gap:1.5rem;flex-wrap:wrap}
.seo-footer-links a{color:var(--td)}
.seo-footer-links a:hover{color:var(--g)}

/* Cards grid */
.perfume-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.25rem;margin:2rem 0}
.perfume-card{background:var(--d3);border:1px solid var(--d4);border-radius:var(--r);padding:1.25rem;transition:border-color .25s}
.perfume-card:hover{border-color:rgba(201,169,110,.3)}
.perfume-card h3{font-size:1rem;margin-bottom:.25rem}
.perfume-card h3 a{color:var(--t);text-decoration:none}
.perfume-card h3 a:hover{color:var(--g)}
.perfume-card .brand{color:var(--td);font-size:.85rem;margin-bottom:.75rem}
.perfume-card .meta{display:flex;gap:.75rem;flex-wrap:wrap;font-size:.8rem;color:var(--td)}
.perfume-card .rating{color:var(--g);font-weight:600}
.accord-tags{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.75rem}
.accord-tag{background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.15);color:var(--g);padding:2px 10px;border-radius:20px;font-size:.75rem}

/* Responsive */
@media(max-width:640px){
  .perfume-grid{grid-template-columns:1fr}
  .seo-header .container{flex-direction:column;gap:.75rem}
  .seo-nav{gap:1rem}
}
</style>
